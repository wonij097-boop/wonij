      background: #efefef;

    .button-wrap {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .link-btn img {
      width: 320px;
      max-width: 100%;
      transition: 0.2s;
      cursor: pointer;
    }

    .link-btn img:hover {
      transform: scale(1.03);
    }

    /* 메인 광고 이미지 */
    .main-image {
      margin-bottom: 50px;
    }

    .main-image img {
      width: 700px;
      max-width: 100%;
      border-radius: 10px;
    }

    /* 하단 버튼 */
    .bottom-buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- 상단 버튼 -->
